name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  install-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 20, 22]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release artifacts
        run: npm run build

      - name: Prepare tarball directory
        run: mkdir smoke-dist

      - name: Pack release tarball
        run: npm pack --ignore-scripts --pack-destination smoke-dist

      - name: Smoke install packaged CLI
        run: npm run smoke:install -- smoke-dist

  release:
    needs: install-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Release readiness
        run: npm run release:check

      - name: Prepare pack preview directory
        run: mkdir pack-preview

      - name: Pack preview
        run: npm pack --ignore-scripts --json --pack-destination pack-preview > pack-preview/pack-preview.json

      - name: Upload pack preview
        uses: actions/upload-artifact@v7
        with:
          name: npm-pack-preview
          path: |
            pack-preview/*

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
